name: Package Application

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag or source ref to package.
        required: true
        default: v0.1.0
      package_version:
        description: Package version used in artifact names and manifests.
        required: true
        default: 0.1.0
      platform:
        description: Platform filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - linux
          - windows
          - macos
          - android
          - ios
          - web
          - container
      architecture:
        description: Architecture filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - x64
          - arm64
          - armv7
          - universal
          - wasm32
          - noarch
      profile:
        description: Runtime profile filter.
        required: true
        default: all
        type: choice
        options:
          - all
          - server
          - desktop
          - mobile
          - web
          - worker
          - library
      format:
        description: Package format filter.
        required: true
        default: all

permissions:
  contents: write
  actions: read
  id-token: write
  attestations: write
  artifact-metadata: write

jobs:
  package:
    uses: Sdkwork-Cloud/sdkwork-github-workflow/.github/workflows/sdkwork-package.yml@v1
    with:
      config_path: sdkwork.workflow.json
      tag: ${{ inputs.tag }}
      package_version: ${{ inputs.package_version }}
      platform: ${{ inputs.platform }}
      architecture: ${{ inputs.architecture }}
      profile: ${{ inputs.profile }}
      format: ${{ inputs.format }}
      publish_release: true
      upload_artifact: true
      retention_days: 30
      framework_ref: v1
      dependency_refs_json: >-
        {
          "SDKWORK_APPBASE_REF": "${{ vars.SDKWORK_APPBASE_REF }}",
          "SDKWORK_CORE_REF": "${{ vars.SDKWORK_CORE_REF }}",
          "SDKWORK_UI_REF": "${{ vars.SDKWORK_UI_REF }}",
          "SDKWORK_IM_SDK_REF": "${{ vars.SDKWORK_IM_SDK_REF }}",
          "SDKWORK_SDK_GENERATOR_REF": "${{ vars.SDKWORK_SDK_GENERATOR_REF }}"
        }
    secrets: inherit
