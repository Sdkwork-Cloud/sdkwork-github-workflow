name: Run SDKWork lifecycle phase
description: Run a configured SDKWork application lifecycle phase for one package target.
inputs:
  config-path:
    required: true
    description: Path to sdkwork.workflow.json.
  phase:
    required: true
    description: Lifecycle phase.
  target-id:
    required: true
    description: Matrix target id.
  platform:
    required: true
    description: Platform filter.
  architecture:
    required: true
    description: Architecture filter.
  profile:
    required: true
    description: Profile filter.
  format:
    required: true
    description: Format filter.
  version:
    required: false
    description: Package version.
    default: ''
  release-tag:
    required: false
    description: Release tag.
    default: ''
  deploy-environment:
    required: false
    description: Deployment environment name.
    default: ''
  deploy-url:
    required: false
    description: Deployment URL.
    default: ''
  deploy-lifecycle:
    required: false
    description: Deployment lifecycle label.
    default: ''
runs:
  using: composite
  steps:
    - shell: bash
      env:
        SDKWORK_CONFIG_PATH: ${{ inputs.config-path }}
        SDKWORK_LIFECYCLE_PHASE: ${{ inputs.phase }}
        SDKWORK_TARGET_ID: ${{ inputs.target-id }}
        SDKWORK_TARGET_PLATFORM: ${{ inputs.platform }}
        SDKWORK_TARGET_ARCHITECTURE: ${{ inputs.architecture }}
        SDKWORK_TARGET_PROFILE: ${{ inputs.profile }}
        SDKWORK_TARGET_FORMAT: ${{ inputs.format }}
        SDKWORK_PACKAGE_VERSION_INPUT: ${{ inputs.version }}
        SDKWORK_RELEASE_TAG_INPUT: ${{ inputs.release-tag }}
        SDKWORK_DEPLOY_ENVIRONMENT_INPUT: ${{ inputs.deploy-environment }}
        SDKWORK_DEPLOY_URL_INPUT: ${{ inputs.deploy-url }}
        SDKWORK_DEPLOY_LIFECYCLE_INPUT: ${{ inputs.deploy-lifecycle }}
      run: |
        set -euo pipefail
        node .sdkwork/github-workflow/scripts/sdkwork-workflow.mjs lifecycle \
          --config "${SDKWORK_CONFIG_PATH}" \
          --phase "${SDKWORK_LIFECYCLE_PHASE}" \
          --target-id "${SDKWORK_TARGET_ID}" \
          --platform "${SDKWORK_TARGET_PLATFORM}" \
          --architecture "${SDKWORK_TARGET_ARCHITECTURE}" \
          --profile "${SDKWORK_TARGET_PROFILE}" \
          --format "${SDKWORK_TARGET_FORMAT}" \
          --version "${SDKWORK_PACKAGE_VERSION_INPUT}" \
          --release-tag "${SDKWORK_RELEASE_TAG_INPUT}" \
          --deploy-environment "${SDKWORK_DEPLOY_ENVIRONMENT_INPUT}" \
          --deploy-url "${SDKWORK_DEPLOY_URL_INPUT}" \
          --deploy-lifecycle "${SDKWORK_DEPLOY_LIFECYCLE_INPUT}" \
          --run
