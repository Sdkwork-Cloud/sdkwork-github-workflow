name: Validate SDKWork workflow config
description: Validate sdkwork.workflow.json with the SDKWork workflow planner.
inputs:
  config-path:
    description: Path to sdkwork.workflow.json.
    required: true
outputs:
  ok:
    description: true when the config is valid.
    value: ${{ steps.validate.outputs.ok }}
  issues-json:
    description: JSON array of validation issues.
    value: ${{ steps.validate.outputs.issues_json }}
runs:
  using: composite
  steps:
    - id: validate
      shell: bash
      env:
        SDKWORK_CONFIG_PATH: ${{ inputs.config-path }}
      run: |
        set -euo pipefail
        node .sdkwork/github-workflow/scripts/sdkwork-workflow.mjs validate \
          --config "${SDKWORK_CONFIG_PATH}" \
          --github-output
